# Release on tag push: clean-runner build of both mac arches, signed,
# notarized, published to GitHub Releases, then hash-verified by
# scripts/verify-release.sh.
#
# HISTORY: the previous version of this workflow built UNSIGNED artifacts
# (CSC_IDENTITY_AUTO_DISCOVERY=false) and silently overwrote the release
# assets published by local `npm run release` runs — every "damaged and
# can't be opened" report on v0.2.6/v0.2.7 traces to it. This version signs
# and notarizes properly, and fails loudly if the secrets below are missing
# instead of shipping unsigned bytes.
#
# Required repo secrets:
#   CSC_LINK                    base64 .p12 export of "Developer ID Application: barry Napier (B45SDP2V36)"
#   CSC_KEY_PASSWORD            password for the .p12
#   APPLE_ID                    Apple ID email for notarytool
#   APPLE_APP_SPECIFIC_PASSWORD app-specific password for notarytool
#   APPLE_TEAM_ID               B45SDP2V36
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, publish, verify
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require signing secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          [ -n "$CSC_LINK" ] && [ -n "$APPLE_ID" ] || {
            echo "Signing/notarization secrets are not configured — refusing to publish an unsigned build." >&2
            exit 1
          }

      - name: Check tag matches package version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          [ "$pkg" = "$GITHUB_REF_NAME" ] || { echo "tag $GITHUB_REF_NAME != package.json $pkg" >&2; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build, publish, verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release
