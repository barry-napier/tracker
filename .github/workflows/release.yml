name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.2.1 or v0.2.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - id: meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            raw="$DISPATCH_VERSION"
          else
            raw="$GITHUB_REF_NAME"
          fi
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Align package version to release version
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build .dmg
        env:
          # Unsigned build: skip codesign identity discovery entirely.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build -- --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Tracker ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/*.dmg
            dist/*.blockmap
            dist/*.yml
          fail_on_unmatched_files: false
