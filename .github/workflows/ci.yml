name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Dev happens on macOS, but nothing here is platform-bound (node server,
    # node:sqlite, git, sh) and Linux minutes are 10x cheaper. If a test ever
    # turns out to lean on macOS, flip the runner rather than the test.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # Tests shell out to git (scratch repos, worktrees); CI runners have no
      # identity configured, so commits inside fixtures would fail without one.
      - run: |
          git config --global user.email "ci@invalid"
          git config --global user.name "CI"
      - run: npx vitest run
