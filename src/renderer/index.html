<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- connect-src covers the Hono API + SSE (packaged: file:// → 127.0.0.1)
         and Vite's dev-mode reload websocket; frame-src lets the review
         wizard's sandboxed iframe load recap artifacts from that same API. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; img-src 'self' data:; frame-src http://127.0.0.1:*"
    />
    <title>Tracker</title>
    <!-- Pre-JS flash guard: CSP forbids inline scripts, so before theme.ts
         runs, follow the OS scheme. A stored non-system preference can differ
         for one frame; acceptable for a local tool. -->
    <style>
      html {
        color-scheme: light dark;
        background-color: light-dark(#fafafa, #161616);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
