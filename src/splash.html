<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0e10;
        color: #e7e9ec;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        -webkit-user-select: none;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #2b2e33, #17181b);
        border: 1px solid #33363c;
        display: grid;
        place-items: center;
        animation: breathe 1.6s ease-in-out infinite;
      }
      .mark svg {
        width: 28px;
        height: 28px;
        stroke: #8ab4ff;
      }
      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(138, 180, 255, 0.25);
        }
        50% {
          transform: scale(1.06);
          box-shadow: 0 0 24px 4px rgba(138, 180, 255, 0.18);
        }
      }
      .name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #b6bac1;
      }
      .bar {
        width: 160px;
        height: 3px;
        border-radius: 3px;
        background: #24262a;
        overflow: hidden;
      }
      .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 3px;
        background: #8ab4ff;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(400%);
        }
      }
      .hint {
        font-size: 11px;
        color: #6b7078;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 17l4-10 4 8 4-12 4 14" />
        </svg>
      </div>
      <div class="name">Tracker</div>
      <div class="bar"></div>
      <div class="hint">Starting the orchestrator…</div>
    </div>
  </body>
</html>
